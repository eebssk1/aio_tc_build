name: CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      use_sys_tc:
        description: 'Use System Toolchain'
        type: boolean
        default: false
      disable_native_lto:
        description: 'Disable LTOed bootstrap'
        type: boolean
        default: false
      use_verbose_ld_super:
        description: 'Enable LD verbose'
        type: boolean
        default: false
jobs:
  gen_tag:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.gen.outputs.TAG }}
      TIME: ${{ steps.gen.outputs.TIME }}
    steps:
      - name: gen
        id: gen
        run: |
          echo "TAG=$(dd if=/dev/urandom bs=32 count=1 2>/dev/null | hexdump -n 4 -e '4/1 "%02x " "\n"' | tr -d ' \n' )" >> "$GITHUB_OUTPUT"
          echo "TIME=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    needs: gen_tag
    container:
      image: ghcr.io/eebssk1/bbk/debian-bookworm:latest
      volumes:
        - /root:/user
    env:
      TAG: ${{ needs.gen_tag.outputs.TAG }}
      TIME: ${{ needs.gen_tag.outputs.TIME }}
      SYS_TC: ${{ inputs.use_sys_tc }}
      IGNORE_CMP_FAIL: 1
    strategy:
      fail-fast: false
      matrix:
        target: [linux-native, linux-native-legacy, mingw64-win, mingw64-win-ms, mingw64-cross, mingw64-cross-ms, mingw64-legacy-cross, mingw64-legacy-cross-ms, arm64-cross, arm32-cross, musl-cross, arm64-gnu-cross, arm32-gnu-cross]

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: swap
        run: exec ./swap.sh
      - name: checkout binutils
        uses: actions/checkout@v4
        with:
          repository: "eebssk1/m_binutils"
          path: "./m_binutils"
      - name: checkout gcc
        uses: actions/checkout@v4
        with:
          repository: "eebssk1/m_gcc"
          path: "./m_gcc"
      - name: enable ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          verbose: 1
          max-size: "1872M"
          key: t_${{ matrix.target }}
      - name: build
        run: |
          if [ "${{ inputs.use_verbose_ld_super }}" = "true" ]; then
            export VERBOSE_LD_SUPER=1
            export VERBOSE_LD=1
          fi
          if [ "${{ inputs.disable_native_lto }}" = "true" ]; then
            export NO_LTO=1
          fi
          exec stdbuf -oL ./exec.sh ${{ matrix.target }}
      - name: log rename
        run: mv out.log stdout_${{ matrix.target }}.log || true
      - name: collect config log
        if: (!cancelled())
        run: exec ./logtar.sh
      - name: upload result
        uses: actions/upload-artifact@v4
        with:
          name: result_${{ matrix.target }}
          path: |
            ./*native.tb2
            ./*cross*.tb2
      - name: upload debug output
        if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: debug_${{ matrix.target }}
          path: |
            ./conflogs*.tgz
            ./curouts*.tgz
            ./stdout_*.log
      - name: release
        uses: ncipollo/release-action@v1.16.0
        with:
          allowUpdates: true
          artifacts: "*native.tb2,*native_*.tb2,*cross*.tb2,conflogs*.tgz,onelog.txt,stdout_*.log"
          commit: main
          makeLatest: true
          tag: ${{ env.TAG }}
          name: ${{ env.TAG }}_${{ env.TIME }}
          bodyFile: notes.txt
          omitBodyDuringUpdate: true

  build-msys:
    runs-on: windows-latest
    needs: gen_tag
    env:
      TAG: ${{ needs.gen_tag.outputs.TAG }}
      TIME: ${{ needs.gen_tag.outputs.TIME }}
      NO_TC_DOWN: 1
    strategy:
      fail-fast: false
      matrix:
        target: [mingw64-msys2, mingw64-msys2-ms]
        include:
          - target: mingw64-msys2
            msystem: UCRT64
          - target: mingw64-msys2-ms
            msystem: MINGW64
    steps:
      - name: setup msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: mingw-w64-ucrt-x86_64-toolchain mingw-w64-x86_64-toolchain python git gmp-devel mpfr-devel mpc-devel isl-devel zlib-devel libzstd-devel bison flex diffutils make
          update: true
          release: false
      - run: git config --global core.autocrlf input
      - name: checkout
        uses: actions/checkout@v4
      - name: build
        env:
          MSYSTEM: ${{ matrix.msystem }}
        run: msys2 -c 'exec ./exec.sh ${{ matrix.target }}'
      - name: upload result
        uses: actions/upload-artifact@v4
        with:
          name: result_${{ matrix.target }}
          path: |
            ./*native.tb2
            ./*cross*.tb2
      - name: collect config log
        if: (!cancelled())
        shell: msys2 {0}
        run: exec ./logtar.sh
      - name: upload debug output
        if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: debug_${{ matrix.target }}
          path: |
            ./conflogs*.tgz
            ./curouts*.tgz
            ./stdout_*.log
      - name: release
        uses: ncipollo/release-action@v1.16.0
        with:
          allowUpdates: true
          artifacts: "*native.tb2,*native_*.tb2,*cross*.tb2,conflogs*.tgz,onelog.txt,stdout_*.log"
          commit: main
          makeLatest: true
          omitBodyDuringUpdate: true
          tag: ${{ env.TAG }}
          name: ${{ env.TAG }}_${{ env.TIME }}
